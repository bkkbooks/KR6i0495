body:
  text: 後漢安息國三藏安世高譯如是我聞一時婆伽婆在王舍城耆闍崛山與大比丘僧俱千二百五十是時難提優婆塞與五百優婆塞出王舍城上耆闍崛山往詣佛所頭面禮足長跪叉手問佛大德願聞優婆塞五戒毀犯正戒有何惡事佛答難提優婆塞楚害生命有十惡事何等十現世常懷害心後世毒心隆赫恆被痛害怨怨不息人不喜見思慮多惡見者怖懼眠不安寐夢則惶怖覺則驚悸死時狂勃種短命栽身壞命終生地獄中設得為人多病少命是為十惡事偷劫他財有十惡事何等十貪餮深重恆為衆疑能興重惡行則非時動則非法親友惡逆賢良踈遠敗戒果敢常懼王伺須財市命種遺寶物貧弊之業身壞命終生地獄中設得為人飢寒困苦致財良難雖獲少財五事共之王賊水火及惡妻子今乃藏埋會亦當失是為十惡事邪淫有十惡事何等十常為其夫伺捕楚毒室家不和善法消竭不善法增危敗軀身不檢其妻不守財賄常為人疑宗親不信種業如是門不貞潔身壞命終生地獄中設得為女非獨一主設得為男馳騁邪淫自失其妻是十惡事妄語中有十惡事何等十口常臭爛善神背叛凶鬼易陵實言流世衆所不信俗為重事不在言議未有實事惡名遠聞為人輕毀不起恭肅雖言有實人不奉用多懷愁怖種誹謗業身死命終生地獄中設得為人常被誹謗是十惡事飲酒有三十五惡何等三十五散盡財賄致衆苦患怨諍增重裸露形軀惡名遐邇慧明日減應得不得已得便失顯揚惡事要務頓發憂戚之本恍惚變沒顏貌鄙惡輕慢尊長不知供養沙門婆羅門自於室家不辨尊卑不宗敬佛不崇大法不敬事僧返親惡人遠離明能崩墜邪道無慚愧心不護根門惛荒淫欲衆所不愛人不喜見德士宿舊咸來咎責集造衆惡要用之勢不豫識任智德隱避像類不別去泥洹遠種狂惑業身死命終生地獄中設得為人愚癡頑瞶是時難提優婆塞及五百清信士諸天世人四輩之衆聞佛所説畢命受持頭面繞竟踊悅而去
